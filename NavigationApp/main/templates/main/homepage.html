{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BUIA - Navigace k nouzovému východu</title>
    <style>
        :root{
            --bg-1: #07070a;
            --bg-2: #0f1720;
            --accent: #00f5ff;
            --accent-2: #7c4dff;
            --muted: rgba(255,255,255,0.35);
            --glass-border: rgba(255,255,255,0.04);
            font-family: Inter, system-ui, "Segoe UI", Roboto, Arial;
        }
        html,body{ height:100%; margin:0; background: linear-gradient(180deg,var(--bg-1),var(--bg-2)); color:#e6eef8; }
        .app { display:grid; grid-template-columns: 1fr 420px; gap:28px; padding:28px; height:100vh; box-sizing:border-box; align-items:stretch; }
        header.app-head{ grid-column:1/-1; display:flex; align-items:center; gap:18px; padding:12px 18px; border-radius:12px; background:rgba(255,255,255,0.02); border: 1px solid var(--glass-border); }
        .canvas { border-radius:14px; padding:22px; background:rgba(255,255,255,0.01); border:1px solid var(--glass-border); position:relative; overflow:hidden; }
        .map { height:calc(100% - 40px); border-radius:10px; position:relative; display:flex; align-items:center; justify-content:center; }
        .floorplan { width:86%; height:86%; border-radius:8px; position:relative; overflow:hidden; background:#061017; }
        .panel { border-radius:14px; padding:18px; background:rgba(255,255,255,0.01); border:1px solid var(--glass-border); display:flex; flex-direction:column; gap:14px; }
        .big { font-weight:700; font-size:28px; color:var(--accent); }
        .muted { color:var(--muted); font-size:13px; }
        #floorplan-svg { width:100%; height:100%; }
        #route-layer { pointer-events:none; }
        #steps-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
        .step { padding:8px; border-radius:8px; background:rgba(255,255,255,0.01); font-size:13px; }
        @media (max-width:980px){ .app{ grid-template-columns: 1fr; padding:16px; } .panel { order:2; } .canvas { order:1; height:64vh; } }
    </style>
</head>
<body>
    <div class="app" role="application" aria-label="Navigace k nouzovému východu">
        <header class="app-head" role="banner">
            <div>
                <h1 style="margin:0;">BUIA — Mobilní navigace k nouzovému východu</h1>
                <p class="subtitle muted" style="margin:0;">Ukázková aplikace — školní půdorys</p>
            </div>
        </header>

        <main class="canvas" role="main">
            <div class="map">
                <div id="floorplan" class="floorplan" role="img" aria-label="Simulovaný půdorys">
                    <svg id="floorplan-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" style="position:absolute;inset:0;">
                        <defs>
                            <linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#00ffd2" stop-opacity="0.08"/><stop offset="1" stop-color="#7c4dff" stop-opacity="0.05"/></linearGradient>
                        </defs>
                        <rect x="0" y="0" width="100" height="100" fill="#071018"/>
                        <!-- simplistic floor geometry for the school layout -->
                        <rect x="4" y="40" width="32" height="20" rx="1" fill="#0b2630" stroke="#0f3a45"/>
                        <rect x="36" y="30" width="40" height="14" rx="1" fill="#0b2630" stroke="#0f3a45"/>
                        <rect x="46" y="14" width="36" height="18" rx="1" fill="#0b2630" stroke="#0f3a45"/>
                        <rect x="64" y="34" width="28" height="18" rx="1" fill="#0b2630" stroke="#0f3a45"/>
                        <rect x="46" y="78" width="12" height="16" rx="1" fill="#0b2630" stroke="#0f3a45"/>
                        <!-- map grid -->
                        <g id="map-grid" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.4"></g>
                        <g id="route-layer"></g>
                        <!-- fixed markers for exits (visual) -->
                        <circle cx="98" cy="50" r="1.6" fill="#ff8a5b" />
                        <circle cx="52" cy="98" r="1.6" fill="#ff8a5b" />
                    </svg>
                </div>
            </div>
        </main>

        <aside class="panel" role="complementary" aria-label="Ovládací panel">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <h3 style="margin:0;">Aktuální vzdálenost</h3>
                    <div id="dist-to-exit" class="big">— m</div>
                    <div class="muted" id="eta">— s</div>
                </div>
                <div style="text-align:right;">
                    <div class="muted">Cíl: nejbližší nouzový východ</div>
                </div>
            </div>

            <div>
                <h3 style="margin:0;">Kroky trasy</h3>
                <div id="steps-list" class="muted"></div>
            </div>

            <div style="margin-top:auto;">
                <div style="display:flex;gap:8px;">
                    <button id="mock-btn" class="btn">Vygenerovat testní pozici</button>
                    <div class="muted" style="align-self:center;font-size:13px;">Klikněte na plán pro vlastní pozici</div>
                </div>
            </div>
        </aside>
    </div>

    <script src="{% static 'main/app.js' %}"></script>
</body>
</html>
